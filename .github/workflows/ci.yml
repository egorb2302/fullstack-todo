name: Continuous Integration

on: 
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env: 
  NODE_VERSION: 24

jobs:
  backend:
    name: backend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Backend checkout
        uses: actions/checkout@v4
      - name: Backend node-download
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Run backend clean install
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Run backend tests
        run: npm run test

  frontend:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Frontend checkout
        uses: actions/checkout@v4
      - name: Frontend node-download
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run frontend clean install
        run: npm ci
      - name: Run frontend linter
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Run frontend tests
        run: npm run test

