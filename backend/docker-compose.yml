services:
  db:
    image: postgres:17-alpine
    container_name: todo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis: 
    image: redis:alpine
    container_name: todo_redis
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: todo_app
    ports: 
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/testdb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: a7f3d9e2b8c1a5f4e3d2c1b9a8f7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0
      REFRESH_SECRET: 7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0d1c0b9a8f7e6d5c4b3a2fb7a6f5e4d3c2b1a0f9e82c1b9a8f7e6d5c4b
      ACCESS_SECRET: a7f3d9e2b8c1a5f4e3d2c1b9a8f7e6d5c4b3a2f1e0d9c8b4e3d2c1b9a8f7e3c2b1a0f9e8d74f9d7c6b5a4f3e2d1c0
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/server.js"]
volumes:
  postgres_data:
  redis_data: